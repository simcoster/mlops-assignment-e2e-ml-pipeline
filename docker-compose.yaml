# Production-style deployment: Airflow + MLflow via Docker Compose.
#
# Prerequisites:
#   1. Copy .env.example to .env and set NEBIUS_API_KEY (and optional S3 vars).
#   2. export AIRFLOW_UID=$(id -u)
#   3. export PIPELINE_HOST_ROOT=$(pwd)   # absolute host path for DockerOperator bind mounts
#   4. bash scripts/build-pipeline-image.sh
#   5. docker compose up airflow-init
#   6. docker compose up -d
#
# Airflow UI: http://localhost:8080  (admin / admin)
# MLflow UI:  http://localhost:5000

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/mlops-assignment/dags
    AIRFLOW__CORE__PYTHONPATH: /opt/mlops-assignment
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PIPELINE_PROJECT_ROOT: /opt/mlops-assignment
    PIPELINE_CONTAINER_ROOT: /mlops-assignment
    PIPELINE_HOST_ROOT: ${PIPELINE_HOST_ROOT:?Set PIPELINE_HOST_ROOT to the absolute host project path}
    PIPELINE_IMAGE: ${PIPELINE_IMAGE:-mlops-pipeline:latest}
    MLFLOW_TRACKING_URI: http://mlflow:5000
  volumes:
    - ${PIPELINE_HOST_ROOT}:/opt/mlops-assignment
    - ./logs/airflow:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  mlflow:
    image: python:3.12-slim
    working_dir: /mlflow
    command:
      - bash
      - -c
      - |
        pip install --no-cache-dir 'mlflow>=2.20.0' \
        && mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri sqlite:////mlflow/mlflow.db \
          --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/mlops-assignment/runs /opt/mlops-assignment/logs
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-db-volume:
  mlflow-data:
