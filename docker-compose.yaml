# Production-style deployment: Airflow + MLflow via Docker Compose.
#
# Prerequisites:
#   1. Copy .env.example to .env and set NEBIUS_API_KEY (and optional S3 vars).
#   2. export PIPELINE_HOST_ROOT=$(pwd)   # absolute host path for DockerOperator bind mounts
#      (or set PIPELINE_HOST_ROOT and DOCKER_GID in .env)
#   4. bash scripts/build-pipeline-image.sh
#   5. docker compose up airflow-init
#   6. docker compose up -d --wait
#
# Airflow UI: http://localhost:8080  (admin / admin)
# MLflow UI:  http://localhost:5000
# MinIO API:  http://localhost:9000  (minioadmin / minioadmin)
# MinIO UI:   http://localhost:9001

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/mlops-assignment/dags
    AIRFLOW__CORE__PYTHONPATH: /opt/mlops-assignment
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PIPELINE_PROJECT_ROOT: /opt/mlops-assignment
    PIPELINE_CONTAINER_ROOT: /mlops-assignment
    PIPELINE_HOST_ROOT: ${PIPELINE_HOST_ROOT:?Set PIPELINE_HOST_ROOT to the absolute host project path}
    PIPELINE_IMAGE: ${PIPELINE_IMAGE:-mlops-pipeline:latest}
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/mlops-assignment
    GIT_PYTHON_REFRESH: quiet
    S3_BUCKET: ${S3_BUCKET:-mlops-runs}
    S3_PREFIX: ${S3_PREFIX:-runs}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://minio:9000}
    ARTIFACTS_S3_URI: ${ARTIFACTS_S3_URI:-}
  volumes:
    - ${PIPELINE_HOST_ROOT}:/opt/mlops-assignment
    - ./logs/airflow:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  group_add:
    - "${DOCKER_GID:?Set DOCKER_GID to the host docker group id (getent group docker | cut -d: -f3)}"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  mlflow:
    image: python:3.12-slim
    working_dir: /mlflow
    command:
      - bash
      - -c
      - |
        echo "MLflow UI: http://localhost:5000" \
        && pip install --no-cache-dir 'mlflow>=2.20.0' \
        && mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --serve-artifacts \
          --allowed-hosts "mlflow,mlflow:5000,localhost:*,127.0.0.1:*" \
          --backend-store-uri sqlite:////mlflow/mlflow.db \
          --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb "local/$${S3_BUCKET}" --ignore-existing
        exit 0
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mlops-runs}

  airflow-webserver:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        echo "Airflow UI: http://localhost:8080  (admin / admin)"
        exec airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/mlops-assignment/runs /opt/mlops-assignment/logs
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-db-volume:
  mlflow-data:
  minio-data:
